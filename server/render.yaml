services:
  - type: web
    name: foodbf-otp-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: RESEND_API_KEY
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false
